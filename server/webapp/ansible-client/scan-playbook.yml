
- name: Scanning BSSIDs
  hosts: all
  gather_facts: no
  become: yes
  
  tasks:
    - name: Script execution
      command: /opt/client/wireless/configuration/script/get_all_bssids -i {{ interface }} -t {{ signal_min }} -j
      register: script_output
      changed_when: false

    - name: Return script output
      debug:
        msg: "{{ script_output.stdout }}"